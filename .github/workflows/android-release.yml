name: Android Release Build

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Install shared upload keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 || secrets.DEBUG_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "Error: ANDROID_KEYSTORE_BASE64 (or DEBUG_KEYSTORE_BASE64) is not set."
            echo "Run ~/.android/signing/sync-github-secrets.ps1 on your laptop."
            exit 1
          fi
          mkdir -p "$RUNNER_TEMP/signing"
          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/signing/upload-keystore.jks"
          if [ ! -s "$RUNNER_TEMP/signing/upload-keystore.jks" ]; then
            echo "Error: decoded keystore is empty."
            exit 1
          fi
          echo "KEYSTORE_FILE=$RUNNER_TEMP/signing/upload-keystore.jks" >> "$GITHUB_ENV"
          echo "KEYSTORE_PASSWORD=${KEYSTORE_PASSWORD:-android}" >> "$GITHUB_ENV"
          echo "KEY_ALIAS=${KEY_ALIAS:-androiddebugkey}" >> "$GITHUB_ENV"
          echo "KEY_PASSWORD=${KEY_PASSWORD:-android}" >> "$GITHUB_ENV"

      - name: Build release APK
        run: ./gradlew assembleRelease --stacktrace

      - name: Find APK
        id: apk
        run: |
          APK=$(find . -path "*/build/outputs/apk/release/*.apk" | head -1)
          if [ -z "$APK" ]; then
            echo "Error: release APK not found"
            exit 1
          fi
          echo "path=$APK" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$APK")" >> "$GITHUB_OUTPUT"

      - name: Extract app version
        id: version
        run: |
          GRADLE_FILE=$(find . -path "*/app/build.gradle.kts" | head -1)
          VERSION_NAME=$(grep -E 'versionName\s*=' "$GRADLE_FILE" | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          VERSION_CODE=$(grep -E 'versionCode\s*=' "$GRADLE_FILE" | head -1 | sed -E 's/.*=\s*([0-9]+).*/\1/')
          echo "name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION_NAME}-build${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-${{ steps.version.outputs.tag }}
          path: ${{ steps.apk.outputs.path }}
          retention-days: 30

      - name: Publish GitHub Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: ${{ steps.apk.outputs.path }}
          tag: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.name }} (build ${{ github.run_number }})
          token: ${{ secrets.GITHUB_TOKEN }}
          generateReleaseNotes: true
          makeLatest: true
          body: |
            **Version:** ${{ steps.version.outputs.name }} (${{ steps.version.outputs.code }})
            **Commit:** ${{ github.sha }}

            Download the APK below to install or update on your device.
